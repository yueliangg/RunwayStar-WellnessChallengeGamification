<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Register - Runway Star</title>
  
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous"
  />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="css/color.css" rel="stylesheet" />
    <link href="css/base.css" rel="stylesheet" />
    <link href="css/page.css" rel="stylesheet" />
    <link href="css/buttons.css" rel="stylesheet" />
    <link href="css/forms.css" rel="stylesheet" />
    <link href="css/cards.css" rel="stylesheet" />
    <link href="css/navbar.css" rel="stylesheet" />
    <link href="css/footer.css" rel="stylesheet" />
    <link href="css/page.css" rel="stylesheet" />
</head>
<body class="d-flex flex-column min-vh-100 auth-page">

  <div id="navbar"></div>

  <!-- Register Form -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow p-4" style="max-width: 450px; width: 100%;">
      <h2 class="card-title text-center mb-4">Create Account</h2>
      <form id="signupForm">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required>
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
        </div>
        <div class="mb-3">
          <label for="star_name" class="form-label">Your Star Name</label>
          <input type="text" class="form-control" id="star_name" placeholder="Enter your runway star name" required>
        </div>
        <button type="submit" class="btn btn-authentication w-100">Register</button>
      </form>

      <div id="warningCard" class="card border-danger mb-3 d-none">
          <div class="card-body text-danger">
              <p id="warningText" class="card-text"></p>
          </div>
      </div>

      <p class="text-center mt-3">
        Already have an account? <a href="./login.html">Login here</a>
      </p>

    </div>
  </main>

  <!-- Footer -->
  <footer class="mt-auto py-3 custom-footer text-center">
    <p class="m-0">Runway Star Game &copy; 2026. Educational Project.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
    integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
    crossorigin="anonymous"
  ></script>
  <script src="js/navbar.js" type="text/javascript"></script>
  <script src="js/queryCmds.js" type="text/javascript"></script>
  <script src="js/getCurrentURL.js" type="text/javascript"></script>
  <script src="js/userNavbarToggle.js" type="text/javascript"></script>
  <script src="js/register.js"></script>

</body>
</html>
