<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wellness Challenges</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  
  <link href="css/color.css" rel="stylesheet" />
  <link href="css/page.css" rel="stylesheet" />
  <link href="css/buttons.css" rel="stylesheet" />
  <link href="css/form.css" rel="stylesheet" />
  <link href="css/cards.css" rel="stylesheet" />
  <link href="css/navbar.css" rel="stylesheet" />
  <link href="css/footer.css" rel="stylesheet" />
  <link href="css/userStat.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- User info container (floating stats box will appear here when logged in) -->
  <div id="getUserInfo"></div>

  <main class="py-4">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
          
          <!-- Create Challenge Form -->
          <div class="card shadow p-4 mb-4">
            <h4>Create Challenge</h4>
            <form id="challengeForm">
              <!-- Description -->
              <div class="form-group pb-3">
                <label for="challengeDescription">Description</label>
                <textarea class="form-control" id="challengeDescription" rows="3" required></textarea>
              </div>

              <!-- Points -->
              <div class="form-group pb-3">
                <label for="challengePoints">Points</label>
                <input type="number" class="form-control" id="challengePoints" required>
              </div>

              <button type="submit" class="btn btn-primary btn-block">Create Challenge</button>
            </form>
          </div>

          <!-- Available Challenges -->
          <div class="card shadow p-4 mb-4">
            <h4>Available Challenges</h4>
            <div class="row" id="availableChallenges">
              <!-- Available challenge cards inserted dynamically via JS -->
            </div>
          </div>

          <!-- Accepted Challenges -->
          <div class="card shadow p-4 mb-4">
            <h4>Accepted Challenges</h4>
            <div class="row" id="acceptedChallenges">
              <!-- Accepted challenge cards inserted dynamically via JS -->
            </div>
          </div>

          <!-- Modal -->
          <div id="modalContainer"></div>

        </div>
      </div>
    </div>
  </main>

  <footer class="mt-auto py-3 custom-footer text-center">
    <p class="m-0">Runway Star Game &copy; 2026. Educational Project.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

  <script src="js/navbar.js" type="text/javascript"></script>
  <script src="js/queryCmds.js" type="text/javascript"></script>
  <script src="js/getCurrentURL.js" type="text/javascript"></script>
  <script src="js/userNavbarToggle.js" type="text/javascript"></script>

  <script src="js/token.js"></script>
  <script src="js/getUserData.js"></script>
  <script src="js/getUserInfo.js" type="text/javascript"></script>
  <script src="js/modal.js" type="text/javascript"></script>
  <script src="js/challenge.js" type="text/javascript"></script>
  <script src="js/avatar.js" type="text/javascript"></script>

</body>
</html>
